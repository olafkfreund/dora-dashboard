# DORA Dashboard — GitLab CI/CD
#
# Port of the GitHub Actions workflows (.github/workflows/{ci,deploy,security}.yml).
# See gitlab/README.md for the CI/CD variables and runner requirements.
#
# This file lives in gitlab/. Point GitLab at it via
#   Settings → CI/CD → General pipelines → "CI/CD configuration file" = gitlab/.gitlab-ci.yml
# or copy it to the repo root as .gitlab-ci.yml.

stages: [test, build, security, deploy]

variables:
  # Image is pushed to the project's GitLab Container Registry by default.
  IMAGE: $CI_REGISTRY_IMAGE
  TAG: $CI_COMMIT_SHA
  NEXT_TELEMETRY_DISABLED: "1"
  # Deploy target (override in project CI/CD variables as needed)
  AWS_REGION: eu-west-2
  EKS_CLUSTER: aws-dashboard-cluster
  NAMESPACE: dora
  RELEASE: dora-dashboard

# ---------------------------------------------------------------------------
# test  — mirrors ci.yml (build-test + helm-lint)
# ---------------------------------------------------------------------------
build-test:
  stage: test
  image: node:22
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: dora
    POSTGRES_PASSWORD: dora
    POSTGRES_DB: dora
    DATABASE_URL: postgresql://dora:dora@postgres:5432/dora
  cache:
    key: { files: [package-lock.json] }
    paths: [node_modules/, .npm/]
  script:
    - npm install --include=dev --no-audit --no-fund --cache .npm
    - npm run lint --if-present
    - npm run typecheck
    - npm test
    - node scripts/migrate.mjs
    - npm run build

helm-lint:
  stage: test
  image:
    name: alpine/helm:3
    entrypoint: [""]
  script:
    - helm lint charts/dora-dashboard -f charts/dora-dashboard/values-aws.yaml
    - helm template dora charts/dora-dashboard -f charts/dora-dashboard/values-aws.yaml > /dev/null

# ---------------------------------------------------------------------------
# security  — mirrors security.yml (trivy fs, npm audit, ZAP baseline)
# ---------------------------------------------------------------------------
trivy-fs:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    # exit-code 0 = report only (matches GitHub). Set to 1 to gate.
    - trivy fs --scanners vuln --severity CRITICAL,HIGH --exit-code 0 --format table .
    - trivy fs --scanners vuln --severity CRITICAL,HIGH --exit-code 0 --format template
        --template "@/contrib/gitlab.tpl" -o gl-container-scanning-report.json .
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
    expire_in: 1 week

npm-audit:
  stage: security
  image: node:22
  allow_failure: true
  script:
    - npm install --include=dev --no-audit --no-fund
    - npm audit --audit-level=high

zap-baseline:
  stage: security
  image: docker:27
  services: [docker:27-dind]
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  allow_failure: true # baseline reports findings; it does not gate the build
  before_script:
    - apk add --no-cache docker-cli-compose openssl curl
  script:
    - docker build -t dora-dashboard:ci .
    - export IMAGE=dora-dashboard:ci
    - export AUTH_SECRET=$(openssl rand -base64 32)
    - export APP_ENCRYPTION_KEY=$(openssl rand -base64 32)
    - docker compose up -d
    - |
      for _ in $(seq 1 40); do
        curl -sf http://docker:8191/login >/dev/null && break || sleep 3
      done
    - docker run --rm --network host -v "$PWD:/zap/wrk:rw" ghcr.io/zaproxy/zaproxy:stable
        zap-baseline.py -t http://docker:8191/login -a -I -r zap-report.html || true
  after_script:
    - docker compose down -v || true
  artifacts:
    paths: [zap-report.html]
    when: always
    expire_in: 1 week

# ---------------------------------------------------------------------------
# build  — mirrors deploy.yml build job (build+push, trivy, cosign, SBOM)
# ---------------------------------------------------------------------------
build-image:
  stage: build
  image: docker:27
  services: [docker:27-dind]
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
    COSIGN_YES: "true"
  id_tokens:
    SIGSTORE_ID_TOKEN: # keyless cosign signing (Sigstore OIDC)
      aud: sigstore
  before_script:
    - apk add --no-cache cosign trivy curl
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
    - docker push "$IMAGE:$TAG"
    - docker push "$IMAGE:latest"
    # Report-only vuln scan (matches GitHub exit-code 0)
    - trivy image --severity CRITICAL,HIGH --exit-code 0 --format table "$IMAGE:$TAG"
    # Sign + SBOM + attest by immutable digest
    - DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE:$TAG")
    - cosign sign --yes "$DIGEST"
    - trivy image --format cyclonedx --output sbom.cyclonedx.json "$IMAGE:$TAG"
    - cosign attest --yes --predicate sbom.cyclonedx.json --type cyclonedx "$DIGEST"
    - sha256sum sbom.cyclonedx.json > sbom.cyclonedx.json.sha256
  artifacts:
    paths: [sbom.cyclonedx.json, sbom.cyclonedx.json.sha256]
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web" # manual run

# ---------------------------------------------------------------------------
# deploy  — mirrors deploy.yml deploy job (Helm upgrade --install to EKS)
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  image: alpine/k8s:1.30.2 # bundles kubectl, helm, aws-cli
  id_tokens:
    AWS_ID_TOKEN: # AWS OIDC federation (assume role, no static keys)
      aud: sts.amazonaws.com
  before_script:
    # OIDC → temporary AWS creds. Requires AWS_ROLE_ARN (see README).
    - echo "$AWS_ID_TOKEN" > /tmp/web_identity_token
    - >
      CREDS=$(aws sts assume-role-with-web-identity
      --role-arn "$AWS_ROLE_ARN" --role-session-name "gitlab-$CI_JOB_ID"
      --web-identity-token file:///tmp/web_identity_token
      --query Credentials --output json);
      export AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r .AccessKeyId);
      export AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r .SecretAccessKey);
      export AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r .SessionToken)
    - aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"
  script:
    - >
      helm upgrade --install "$RELEASE" charts/dora-dashboard
      --namespace "$NAMESPACE" --create-namespace
      -f charts/dora-dashboard/values-aws.yaml
      --set image.tag="${DEPLOY_TAG:-$CI_COMMIT_SHA}"
      --wait --timeout 10m
    - kubectl rollout status deploy/"$RELEASE" -n "$NAMESPACE" --timeout=5m
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
