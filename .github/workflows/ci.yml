name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dora
          POSTGRES_PASSWORD: dora
          POSTGRES_DB: dora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://dora:dora@localhost:5432/dora
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck

      - name: Apply migrations
        run: node scripts/migrate.mjs

      - name: Build
        run: npm run build

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: helm lint charts/dora-dashboard -f charts/dora-dashboard/values-aws.yaml
      - name: Helm template
        run: helm template dora charts/dora-dashboard -f charts/dora-dashboard/values-aws.yaml > /dev/null
