apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dora.fullname" . }}-config
  labels:
    {{- include "dora.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXTAUTH_URL: {{ include "dora.nextauthUrl" . | quote }}
