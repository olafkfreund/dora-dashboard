{{- if .Values.secrets.create -}}
{{- $name := include "dora.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $data := dict -}}
{{- if $existing -}}{{- $data = $existing.data -}}{{- end -}}

{{/* AUTH_SECRET */}}
{{- $authSecret := .Values.secrets.authSecret -}}
{{- if not $authSecret -}}
  {{- if (index $data "AUTH_SECRET") -}}{{- $authSecret = (index $data "AUTH_SECRET" | b64dec) -}}
  {{- else -}}{{- $authSecret = (randAlphaNum 32 | b64enc) -}}{{- end -}}
{{- end -}}

{{/* APP_ENCRYPTION_KEY (decoded length must be 32 bytes) */}}
{{- $encKey := .Values.secrets.appEncryptionKey -}}
{{- if not $encKey -}}
  {{- if (index $data "APP_ENCRYPTION_KEY") -}}{{- $encKey = (index $data "APP_ENCRYPTION_KEY" | b64dec) -}}
  {{- else -}}{{- $encKey = (randAlphaNum 32 | b64enc) -}}{{- end -}}
{{- end -}}

{{/* PostgreSQL password (only if bundled) */}}
{{- $pgPassword := .Values.postgres.password -}}
{{- if and .Values.postgres.enabled (not $pgPassword) -}}
  {{- if (index $data "POSTGRES_PASSWORD") -}}{{- $pgPassword = (index $data "POSTGRES_PASSWORD" | b64dec) -}}
  {{- else -}}{{- $pgPassword = (randAlphaNum 24) -}}{{- end -}}
{{- end -}}

{{/* DATABASE_URL */}}
{{- $databaseUrl := .Values.secrets.databaseUrl -}}
{{- if .Values.postgres.enabled -}}
  {{- $databaseUrl = printf "postgresql://%s:%s@%s:5432/%s" .Values.postgres.user $pgPassword (include "dora.postgresName" .) .Values.postgres.database -}}
{{- else if not $databaseUrl -}}
  {{- if (index $data "DATABASE_URL") -}}{{- $databaseUrl = (index $data "DATABASE_URL" | b64dec) -}}{{- end -}}
{{- end -}}

{{/* Bootstrap admin password */}}
{{- $adminPassword := .Values.bootstrap.adminPassword -}}
{{- if not $adminPassword -}}
  {{- if (index $data "BOOTSTRAP_ADMIN_PASSWORD") -}}{{- $adminPassword = (index $data "BOOTSTRAP_ADMIN_PASSWORD" | b64dec) -}}
  {{- else -}}{{- $adminPassword = (randAlphaNum 16) -}}{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "dora.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_SECRET: {{ $authSecret | quote }}
  AUTH_TRUST_HOST: "true"
  APP_ENCRYPTION_KEY: {{ $encKey | quote }}
  DATABASE_URL: {{ $databaseUrl | quote }}
  BOOTSTRAP_ADMIN_EMAIL: {{ .Values.bootstrap.adminEmail | quote }}
  BOOTSTRAP_ADMIN_PASSWORD: {{ $adminPassword | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ $pgPassword | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  {{- end }}
{{- end }}
