## Default values for dora-dashboard.

replicaCount: 2

image:
  repository: ghcr.io/olafkfreund/dora-dashboard
  # Overrides the image tag (defaults to chart appVersion).
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  # Public hostname. On EKS + ingress-nginx we use <ELB-IP>.nip.io.
  host: 52.56.112.109.nip.io
  clusterIssuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: dora-dashboard-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

## App configuration (non-secret).
config:
  # Public origin used by Auth.js. Defaults to https://<ingress.host>.
  nextauthUrl: ""

## Secrets. Generated on first install and preserved across upgrades (via lookup).
## For production, set secrets.databaseUrl to a managed DB and disable postgres.
secrets:
  create: true
  existingSecret: ""
  authSecret: ""        # AUTH_SECRET (generated if empty)
  appEncryptionKey: ""  # APP_ENCRYPTION_KEY, 32-byte base64 (generated if empty)
  databaseUrl: ""       # external DB URL; ignored when postgres.enabled

bootstrap:
  adminEmail: admin@dora.local
  adminPassword: ""     # generated once if empty (see NOTES on how to read it)

## Optional bundled PostgreSQL (demo / self-contained). Disable for RDS.
postgres:
  enabled: true
  image: postgres:16-alpine
  user: dora
  password: ""          # generated if empty
  database: dora
  # Persistence requires a working block-storage provisioner (e.g. EBS CSI).
  # Set persistence.enabled=false to use ephemeral emptyDir (data lost on restart).
  persistence:
    enabled: true
  storage: 5Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

## Migrations + seed. The initContainer is the primary mechanism (runs in the web
## pod, no extra slot). The Job hook is opt-in for clusters that prefer it — leave
## it off so migrate+seed don't run twice per rollout.
migrate:
  # Run as a post-install/upgrade hook Job (needs a schedulable pod slot).
  enabled: false
  # Run as an initContainer inside the web pod on every start (no extra pod).
  # Idempotent; ensures schema + bootstrap admin exist even after a DB reset.
  initContainer: true

## Rolling update strategy. On tiny/at-capacity nodes set maxSurge: 0.
updateStrategy:
  maxSurge: 1
  maxUnavailable: 0

# Restrict DB access to the app's own pods (NetworkPolicy). No-op if the CNI
# does not enforce policies, but safe to apply.
networkPolicy:
  enabled: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# Scheduled report digest. The app sends it (email or Teams/Slack webhook) when a
# CronJob POSTs to /api/digest/run with the shared DIGEST_SECRET. Configure the
# channel/recipients in Settings → Notifications; enable + schedule here.
digest:
  enabled: false
  schedule: "0 8 * * 1" # Mondays 08:00 UTC
  secret: "" # generated & persisted in the release Secret if empty
  image: "curlimages/curl:8.10.1"
