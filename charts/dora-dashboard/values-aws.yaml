## Overrides for the aws-dashboard-cluster (EKS, eu-west-2).
## Usage:
##   helm upgrade --install dora charts/dora-dashboard \
##     -n aws-dashboard --create-namespace \
##     -f charts/dora-dashboard/values-aws.yaml \
##     --set image.tag=<git-sha>

# Single node cluster with limited ENI IPs — keep the replica count modest.
replicaCount: 1

image:
  repository: ghcr.io/olafkfreund/dora-dashboard
  tag: 3e4483d  # pinned to deployed immutable build (CI overrides per push)
  pullPolicy: IfNotPresent

# GHCR image is private — the deploy creates this pull secret in the namespace.
imagePullSecrets:
  - name: ghcr-pull

ingress:
  enabled: true
  className: nginx
  # Dedicated host — leaves the existing portal on 52.56.112.109.nip.io untouched.
  host: dora.52.56.112.109.nip.io
  clusterIssuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: dora-dashboard-tls
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

# Disabled: no metrics-server in the cluster (HPA can't read CPU).
autoscaling:
  enabled: false

# Bundled Postgres for this environment. For a hardened prod install, set
# postgres.enabled=false and secrets.databaseUrl to an RDS connection string.
postgres:
  enabled: true
  # Cluster has no EBS CSI driver, so use ephemeral storage for now.
  # For persistence: install the aws-ebs-csi-driver addon and set this true
  # (storageClass: gp2), or use managed RDS (postgres.enabled=false).
  persistence:
    enabled: false

bootstrap:
  adminEmail: admin@dora.local

# Node is at its pod cap (11/11), so the separate migrate Job can't schedule.
# Instead the web pod runs migrate+seed as an initContainer (no extra pod).
migrate:
  enabled: false
  initContainer: true

# Pod cap is full — terminate the old pod before creating the new one on rollout.
updateStrategy:
  maxSurge: 0
  maxUnavailable: 1
